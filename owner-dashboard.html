<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="owner.pageTitle">Owner Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <style>body { background-color: #f1f5f9; }</style>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="owner-dashboard">
  <header class="topbar">
    <div>
      <p class="eyebrow" data-i18n="owner.workspace">Owner Workspace</p>
      <h1 data-i18n="owner.title">Machinery Registration</h1>
    </div>
    <div class="topbar__actions">
      <div class="lang-toggle">
        <button class="button button--ghost lang-btn" data-lang="en">EN</button>
        <button class="button button--ghost lang-btn" data-lang="si">සිං</button>
        <button class="button button--ghost lang-btn" data-lang="ta">தமிழ்</button>
      </div>
      <a class="button button--ghost" href="owner-maintenance-dashboard.html">Maintenance</a>
      <a class="button button--ghost" href="help.html">Help</a>
      <span id="owner-user-summary" class="pill"></span>
      <button id="logout-button" class="button button--ghost" type="button" data-i18n="common.logout">Logout</button>
    </div>
  </header>

  <main class="page-shell page-shell--dashboard">
    <section id="owner-notifications" class="panel notice-banner" hidden></section>

    <section class="panel">
      <div class="section-head">
        <div>
          <p class="eyebrow" data-i18n="owner.newSubmission">New Submission</p>
          <h2 data-i18n="owner.registerMachinery">Register Machinery</h2>
        </div>
        <p id="owner-fee-preview" class="fee-chip">Current fee tier: Rs. 1000</p>
      </div>

      <form id="machinery-form" class="grid-form">
        <label>
          <span data-i18n="owner.machineryType">Machinery Type</span>
          <select id="machinery-type" name="type" required></select>
        </label>
        <label>
          <span data-i18n="owner.makeModel">Make / Model</span>
          <input type="text" name="makeModel" required>
        </label>
        <label>
          <span data-i18n="owner.countryOfOrigin">Country of Origin</span>
          <input type="text" name="countryOfOrigin" required>
        </label>
        <label>
          <span data-i18n="owner.currentLocation">Current Location</span>
          <input type="text" name="location" required>
        </label>
        <label>
          <span data-i18n="doc.revenueLicense">Revenue License</span>
          <input type="file" name="revenueLicense" accept=".pdf,image/*" required>
        </label>
        <label>
          <span data-i18n="doc.motorTrafficCertificate">Motor Traffic Registration Certificate</span>
          <input type="file" name="motorTrafficCertificate" accept=".pdf,image/*" required>
        </label>
        <label>
          <span data-i18n="doc.affidavit">Affidavit</span>
          <input type="file" name="affidavit" accept=".pdf,image/*" required>
        </label>
        <label class="grid-span-2">
          <span data-i18n="doc.engineerReport">Engineer Report</span>
          <input type="file" name="engineerReport" accept=".pdf,image/*" required>
        </label>
        <button class="button button--primary grid-span-2" type="submit" style="margin-top: 1rem;" data-i18n="owner.submitAndPay">Proceed to Payment & Submit</button>
      </form>

      <div id="owner-form-feedback" class="feedback" aria-live="polite"></div>
    </section>

    <section class="panel">
      <div class="section-head">
        <div>
          <p class="eyebrow" data-i18n="owner.statusBoard">Status Board</p>
          <h2 data-i18n="owner.records">Your Machinery Records</h2>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-i18n="common.registrationNumber">Registration No.</th>
              <th data-i18n="common.type">Type</th>
              <th data-i18n="common.model">Model</th>
              <th data-i18n="common.status">Status</th>
              <th data-i18n="owner.registrationDate">Registration Date</th>
              <th data-i18n="owner.expiryDate">Expiry Date</th>
              <th data-i18n="common.actions">Actions</th>
            </tr>
          </thead>
          <tbody id="owner-machinery-body"></tbody>
        </table>
      </div>
    </section>

  </main>

  <div id="owner-certificate-modal" class="modal" hidden>
    <div class="modal__backdrop" data-owner-close-modal="certificate"></div>
    <div class="modal__panel">
      <div class="modal__header">
        <h2 data-i18n="owner.certificateTitle">Digital Certificate of Registration</h2>
        <button class="button button--ghost" type="button" data-owner-close-modal="certificate" data-i18n="common.close">Close</button>
      </div>
      <div id="owner-certificate-content"></div>
      <div class="modal__actions">
        <button id="owner-certificate-print" class="button button--primary" type="button" data-i18n="owner.printCertificate">Print / Save PDF</button>
      </div>
    </div>
  </div>

  <div id="owner-appeal-modal" class="modal" hidden>
    <div class="modal__backdrop" data-owner-close-modal="appeal"></div>
    <div class="modal__panel">
      <div class="modal__header">
        <h2 data-i18n="owner.appealTitle">Submit Appeal</h2>
        <button class="button button--ghost" type="button" data-owner-close-modal="appeal" data-i18n="common.close">Close</button>
      </div>
      <form id="owner-appeal-form" class="stack">
        <p id="owner-appeal-summary" class="muted"></p>
        <label>
          <span data-i18n="owner.appealExplanation">Appeal Explanation</span>
          <textarea id="owner-appeal-message" name="appealMessage" rows="5" required data-i18n-placeholder="owner.appealPlaceholder" placeholder="Explain why the decision should be reviewed."></textarea>
        </label>
        <div id="owner-appeal-feedback" class="feedback" aria-live="polite"></div>
        <div class="modal__actions">
          <button class="button button--primary" type="submit" data-i18n="common.submit">Submit</button>
          <button class="button button--ghost" type="button" data-owner-close-modal="appeal" data-i18n="common.cancel">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/db.js"></script>
  <script src="js/migration.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/owner.js"></script>
</body>
</html>
